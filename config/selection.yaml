# Event selection and BDT training configuration

triggers:
  - HLT_IsoMu24
  #- HLT_TripleMu_12_10_5
  #- HLT_DoubleMu4_3_LowMass
  #- HLT_Mu17_TrkIsoVVL_Mu8_TrkIsoVVL_DZ_Mass3p8

muon:
  pt_lead:        26.0     # GeV
  pt_sublead:     10.0
  pt_other:        5.0
  eta_max:         2.4
  iso_max:         0.35    # PF relIso (R=0.4), loose for HZZ
  dxy_max:         0.5     # cm
  dz_max:          1.0
  sip3d_max:       4.0
  id:              "tight" # NanoAOD branch: Muon_tightId

z_pairing:
  mZ1_min:        40.0     # GeV
  mZ1_max:       120.0
  mZ2_min:        12.0
  mZ2_max:       120.0

four_lepton:
  m4l_min:        70.0     # training window
  m4l_max:      1000.0
  charge_sum:        0     # opposite-sign quartet

# BDT hyperparameters — start conservative, tune later.
bdt:
  n_estimators:    3000
  max_depth:         2
  learning_rate:     0.05
  subsample:         0.8
  colsample_bytree:  0.8
  min_child_weight:  20
  reg_alpha:         0.0
  reg_lambda:        1.0
  early_stopping_rounds: 50
  eval_metric:    "auc"

train:
  test_size:       0.25    # fraction held out for evaluation
  val_size:        0.15    # fraction of train used for early-stopping
  seed:              42
  use_gpu:        true     # set false to force CPU
  # Path 1 — signal-region-restricted training. Filter the dataframe to a
  # narrow m4l window before splitting. With both classes confined to the
  # SR, the kinematic supports are comparable, the full feature set (incl.
  # mass) can be retained, and the residual m4l structure within the
  # window is what the downstream mass fit explicitly resolves. See
  # src/train.py::apply_signal_region.
  signal_region:
    enabled:      false
    m4l_min:      105.0
    m4l_max:      140.0
  # Planing: per-class m4l reweighting so each class has a flat m4l shape
  # at training time. Kept off — see iter v3 in README for failure mode.
  planing:
    enabled:      true
    m4l_col:      "m4l"
    n_bins:        50
    m4l_range:    [70, 250]   # GeV
